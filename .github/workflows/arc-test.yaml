name: ARC runner test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: arc-runner-set
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Show runner details
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "Hostname:"
          hostname
          echo "Who am I:"
          whoami
          echo "Working directory:"
          pwd

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Confirm repo contents
        run: |
          ls -la
          echo "Git version:"
          git --version

      - name: Quick network check
        run: |
          echo "DNS + HTTPS check:"
          getent hosts github.com || nslookup github.com || true
          curl -I https://github.com | head -n 5

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ ARC Runner Test Passed",
                "description": "Ran on self-hosted ARC runner.",
                "color": 3066993,
                "fields": [
                  { "name": "Workflow", "value": "${{ github.workflow }}", "inline": true },
                  { "name": "Triggered by", "value": "${{ github.actor }}", "inline": true },
                  { "name": "Run", "value": "[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": true }
                ]
              }]
            }'

  test-fallback:
    runs-on: ubuntu-latest
    needs: test
    if: failure()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Show runner details
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "Hostname:"
          hostname
          echo "Who am I:"
          whoami
          echo "Working directory:"
          pwd

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Confirm repo contents
        run: |
          ls -la
          echo "Git version:"
          git --version

      - name: Quick network check
        run: |
          echo "DNS + HTTPS check:"
          curl -I https://github.com | head -n 5

      - name: Notify Discord (success via fallback)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ ARC Runner Test Passed (fallback)",
                "description": "ARC runner unavailable — ran on GitHub-hosted runner instead.",
                "color": 15105570,
                "fields": [
                  { "name": "Workflow", "value": "${{ github.workflow }}", "inline": true },
                  { "name": "Triggered by", "value": "${{ github.actor }}", "inline": true },
                  { "name": "Run", "value": "[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": true }
                ]
              }]
            }'
