name: Notify Discord on Renovate PRs

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  # Real notifications for Renovate PRs
  notify-discord:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'renovate[bot]'

    steps:
      - name: Send embed to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          payload=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "📦 Renovate opened PR #${PR_NUMBER}",
                "url": "${PR_URL}",
                "description": "**${PR_TITLE}**",
                "color": 5793266,
                "fields": [
                  {
                    "name": "Repository",
                    "value": "\`${REPO}\`",
                    "inline": true
                  },
                  {
                    "name": "Branch",
                    "value": "\`${HEAD_BRANCH}\` ⟶ \`${BASE_BRANCH}\`",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Renovate Bot • GitOps"
                }
              }
            ]
          }
          EOF
          )

          curl -X POST \
               -H "Content-Type: application/json" \
               -d "$payload" \
               "$DISCORD_WEBHOOK_URL"

  # Manual test job – runs only when you click "Run workflow"
  test-discord:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Send TEST embed to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "🧪 TEST: Renovate Discord webhook",
                "description": "Manual test run from GitHub Actions for \`${REPO}\`",
                "color": 16753920,
                "fields": [
                  {
                    "name": "Triggered by",
                    "value": "<@${{ github.actor }}>",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Manual webhook test"
                }
              }
            ]
          }
          EOF
          )

          curl -X POST \
               -H "Content-Type: application/json" \
               -d "$payload" \
               "$DISCORD_WEBHOOK_URL"
