name: Notify Discord on Renovate PRs

on:
  # Normal behavior: run when PRs change
  pull_request:
    types: [opened, reopened, ready_for_review]

  # Extra: allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    # Only send real notifications for Renovate PRs
    # When run manually, github.event_name == 'workflow_dispatch', so this condition is false
    if: github.event_name == 'pull_request' && github.actor == 'renovate[bot]'

    steps:
      - name: Send embed to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          payload=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "📦 Renovate opened PR #${PR_NUMBER}",
                "url": "${PR_URL}",
                "description": "**${PR_TITLE}**",
                "color": 5793266,
                "fields": [
                  {
                    "name": "Repository",
                    "value": "\`${REPO}\`",
                    "inline": true
                  },
                  {
                    "name": "Branch",
                    "value": "\`${HEAD_BRANCH}\` ⟶ \`${BASE_BRANCH}\`",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Renovate Bot • GitOps"
                }
              }
            ]
          }
          EOF
          )

          curl -X POST \
               -H "Content-Type: application/json" \
               -d "$payload" \
               "$DISCORD_WEBHOOK_URL"
