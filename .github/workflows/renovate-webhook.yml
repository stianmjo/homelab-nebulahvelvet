name: Notify Discord on Renovate PRs

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  notify-discord:
    runs-on: arc-runner-set
    # Only for Renovate-style branches
    if: >
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'renovate/')

    steps:
      - name: Send embed to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          ACTION: ${{ github.event.action }}
        run: |
          if [ "$ACTION" = "synchronize" ]; then
            TITLE="📦 Renovate updated PR #${PR_NUMBER}"
          else
            TITLE="📦 Renovate opened PR #${PR_NUMBER}"
          fi

          payload=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "${TITLE}",
                "url": "${PR_URL}",
                "description": "**${PR_TITLE}**",
                "color": 5793266,
                "fields": [
                  {
                    "name": "Repository",
                    "value": "\`${REPO}\`",
                    "inline": true
                  },
                  {
                    "name": "Branch",
                    "value": "\`${HEAD_BRANCH}\` ⟶ \`${BASE_BRANCH}\`",
                    "inline": true
                  },
                  {
                    "name": "Event",
                    "value": "\`${ACTION}\`",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Renovate Bot • GitOps"
                }
              }
            ]
          }
          EOF
          )

          curl -X POST \
               -H "Content-Type: application/json" \
               -d "$payload" \
               "$DISCORD_WEBHOOK_URL"
