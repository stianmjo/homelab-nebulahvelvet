apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crafty-body-size
  namespace: crafty
spec:
  buffering:
    # 1 GiB max upload (bytes)
    maxRequestBodyBytes: 1073741824

    # Keep first 10 MiB in memory, spill the rest to disk
    memRequestBodyBytes: 10485760
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: f2b-crafty
  namespace: traefik-external
spec:
  plugin:
    fail2ban:
      rules:
        enabled: true
        # Upload-friendly: ONLY count real blocking events (bot-wrangler 403 etc.)
        # Avoid 401/404/429 so uploads + UI noise don't self-ban you
        statuscode: "403"
        findtime: "10m"
        maxretry: 10
        bantime: "1h"
        urlregexps:
          - regexp: "^/ping$"
            mode: allow
          - regexp: "^/metrics$"
            mode: allow