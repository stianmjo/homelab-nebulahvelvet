apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitlab-postgres
  namespace: gitlab
spec:
  instances: 3
  primaryUpdateStrategy: supervised
  bootstrap:
    initdb:
      database: gitlab
      owner: gitlab
      secret:
        name: gitlab-db-credentials
  storage:
    size: 10Gi
    storageClass: longhorn