# ──────────────────────────────────────────────────────────────────────────────
# GitLab secret reference — apply ALL of these BEFORE committing the manifests.
# This file is documentation only. Do not commit real values.
# ──────────────────────────────────────────────────────────────────────────────
#
# ── 0. SeaweedFS buckets (create FIRST, before any secrets) ──────────────────
# Log into s3.local.net or use the SeaweedFS shell / s3cmd / mc to create:
#
#   gitlab-lfs
#   gitlab-artifacts
#   gitlab-uploads
#   gitlab-packages
#   gitlab-backups
#   gitlab-backup-tmp
#   gitlab-registry
#
# ── 1. Initial root password ──────────────────────────────────────────────────
#
#   kubectl -n gitlab create secret generic gitlab-initial-root-password \
#     --from-literal=password='<STRONG_PASSWORD>'
#
# ── 2. Database credentials ───────────────────────────────────────────────────
# Shared by CNPG (creates the DB user) and the GitLab chart (connects to DB).
#
#   kubectl -n gitlab create secret generic gitlab-db-credentials \
#     --from-literal=username=gitlab \
#     --from-literal=password='<STRONG_DB_PASSWORD>'
#
# ── 3. Rails secrets ──────────────────────────────────────────────────────────
# Generate keys first:
#
#   SECRET_KEY_BASE=$(openssl rand -hex 64)
#   OTP_KEY_BASE=$(openssl rand -hex 64)
#   DB_KEY_BASE=$(openssl rand -hex 64)
#   OPENID_KEY=$(openssl genrsa 4096 2>/dev/null)
#   CI_JWT_KEY=$(openssl genrsa 4096 2>/dev/null)
#
# Create rails-secrets.yml locally (never commit this file):
#
#   cat > /tmp/rails-secrets.yml <<EOF
#   production:
#     secret_key_base: ${SECRET_KEY_BASE}
#     otp_key_base: ${OTP_KEY_BASE}
#     db_key_base: ${DB_KEY_BASE}
#     openid_connect_signing_key: |
#   $(echo "$OPENID_KEY" | sed 's/^/    /')
#     ci_jwt_signing_key: |
#   $(echo "$CI_JWT_KEY" | sed 's/^/    /')
#   EOF
#
#   kubectl -n gitlab create secret generic gitlab-rails-secret \
#     --from-file=secrets.yml=/tmp/rails-secrets.yml
#   rm /tmp/rails-secrets.yml
#
# ── 4. SMTP credentials ───────────────────────────────────────────────────────
#
#   kubectl -n gitlab create secret generic gitlab-smtp-secret \
#     --from-literal=username='<PROTONMAIL_SMTP_USERNAME>' \
#     --from-literal=password='<PROTONMAIL_SMTP_PASSWORD>'
#
# ── 5. S3 connection for Rails (Fog/AWS format) ───────────────────────────────
# This covers: lfs, artifacts, uploads, packages, backups, registry connection.
#
#   cat > /tmp/s3-connection.yaml <<EOF
#   provider: AWS
#   region: us-east-1
#   aws_access_key_id: <SEAWEEDFS_ACCESS_KEY>
#   aws_secret_access_key: <SEAWEEDFS_SECRET_KEY>
#   aws_signature_version: 4
#   host: sw-filer.seaweedfs.svc.cluster.local
#   endpoint: http://sw-filer.seaweedfs.svc.cluster.local:8333
#   path_style: true
#   EOF
#
#   kubectl -n gitlab create secret generic gitlab-s3-secret \
#     --from-file=connection=/tmp/s3-connection.yaml
#   rm /tmp/s3-connection.yaml
#
# ── 6. Registry storage (Docker Distribution / OCI format) ───────────────────
#
#   cat > /tmp/registry-s3-config.yaml <<EOF
#   s3:
#     accesskey: <SEAWEEDFS_ACCESS_KEY>
#     secretkey: <SEAWEEDFS_SECRET_KEY>
#     bucket: gitlab-registry
#     region: us-east-1
#     regionendpoint: http://sw-filer.seaweedfs.svc.cluster.local:8333
#     v4auth: true
#     pathstyle: true
#     secure: false
#   EOF
#
#   kubectl -n gitlab create secret generic gitlab-registry-s3-secret \
#     --from-file=config=/tmp/registry-s3-config.yaml
#   rm /tmp/registry-s3-config.yaml
#
# ──────────────────────────────────────────────────────────────────────────────
# Summary of secrets in namespace: gitlab
# ──────────────────────────────────────────────────────────────────────────────
#   gitlab-initial-root-password   key: password
#   gitlab-db-credentials          keys: username, password
#   gitlab-rails-secret            key: secrets.yml
#   gitlab-smtp-secret             keys: username, password
#   gitlab-s3-secret               key: connection
#   gitlab-registry-s3-secret      key: config
# ──────────────────────────────────────────────────────────────────────────────