apiVersion: v1
kind: Secret
metadata:
  name: romm-secret
  namespace: romm
type: Opaque
stringData:
  # Password RomM uses to connect to PostgreSQL - must match romm-db-credentials
  DB_PASSWD: ""

  # Random 32-byte hex string for signing session tokens
  # Generate with: openssl rand -hex 32
  ROMM_AUTH_SECRET_KEY: ""

  # IGDB API credentials from dev.twitch.tv/console
  # Used for game metadata, cover art, descriptions etc.
  IGDB_CLIENT_ID: ""
  IGDB_CLIENT_SECRET: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: romm-db-credentials
  namespace: romm
type: Opaque
stringData:
  # PostgreSQL credentials used by CNPG to create the romm database user
  # password must match DB_PASSWD in romm-secret above
  username: romm
  password: ""