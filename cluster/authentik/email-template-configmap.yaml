apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-templates
  namespace: authentik
data:
  password_reset.html: |
    {% extends "email/base.html" %}
    {% load i18n %}
    {% load humanize %}
    {% block logo_url %}https://auth.nebulahvelvet.no/media/public/logo-transparent.svg{% endblock %}
    {% block content %}
    <tr>
      <td align="center">
        <h1>
          {% blocktrans with username=user.username %}
          Hi {{ username }},
          {% endblocktrans %}
        </h1>
      </td>
    </tr>
    <tr>
      <td align="center">
        <table border="0">
          <tr>
            <td align="center" style="max-width: 300px; padding: 20px 0; color: #212124;">
              {% blocktrans %}
              You recently requested to change your password for your nebulahvelvet account. Use the button below to set a new password.
              {% endblocktrans %}
            </td>
          </tr>
          <tr>
            <td align="center" class="btn btn-primary">
              <a id="confirm" href="{{ url }}" rel="noopener noreferrer" target="_blank">{% trans 'Reset Password' %}</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    {% endblock %}
    {% block sub_content %}
    <tr>
      <td style="padding: 20px; font-size: 12px; color: #212124;" align="center">
        {% blocktrans with expires=expires|naturaltime %}
        If you did not request a password change, please ignore this email. The link above is valid for {{ expires }}.
        {% endblocktrans %}
      </td>
    </tr>
    {% endblock %}
  event_notification.html: |
    {% extends "email/base.html" %}
      {% load i18n %}
      {% block logo_url %}https://auth.nebulahvelvet.no/media/public/logo-transparent.svg{% endblock %}
      {% block content %}
      <tr>
        <td align="center">
          <h1>
            {{ title }}
          </h1>
        </td>
      </tr>
      <tr>
        <td align="center">
          <table border="0">
            <tr>
              <td align="center" style="max-width: 300px; padding: 20px 0; color: #212124;">
                {{ body }}
              </td>
            </tr>
            {% if link %}
            <tr>
              <td align="center" class="btn btn-primary">
                <a id="confirm" href="{{ link.target }}" rel="noopener noreferrer" target="_blank">{{ link.label }}</a>
              </td>
            </tr>
            {% endif %}
            {% if key_value %}
            <tr>
              <td>
                <table class="properties-table" width="100%">
                  <tbody>
                    {% for key, value in key_value.items %}
                    <tr>
                      <td class="td-right">{{ key }}</td>
                      <td class="td-left">{{ value }}</td>
                    </tr>
                    {% endfor %}
                  </tbody>
                </table>
              </td>
            </tr>
            {% endif %}
          </table>
        </td>
      </tr>
      {% endblock %}
      {% block sub_content %}
      {% if source %}
      <tr>
        <td style="padding: 20px; font-size: 12px; color: #212124;" align="center">
          {% blocktranslate with name=source.from %}
          This email was sent from the notification transport <code>{{ name }}</code>.
          {% endblocktranslate %}
        </td>
      </tr>
      {% endif %}
      {% endblock %}