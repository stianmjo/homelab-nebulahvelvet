apiVersion: batch/v1
kind: CronJob
metadata:
  name: authentik-postgres-dump
  namespace: authentik
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: backup
              emptyDir: {}
          initContainers:
            - name: pg-dump
              image: postgres:16-alpine
              command:
                - sh
                - -c
                - |
                  pg_dump -h authentik-postgres-rw.authentik.svc.cluster.local \
                    -U authentik authentik | gzip > /backup/dump.sql.gz
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: authentik-db-credentials
                      key: password
              volumeMounts:
                - name: backup
                  mountPath: /backup
          containers:
            - name: upload
              image: amazon/aws-cli
              command:
                - sh
                - -c
                - |
                  aws s3 cp /backup/dump.sql.gz \
                    "s3://authentik-postgres/dumps/$(date +%Y%m%d).sql.gz" \
                    --endpoint-url http://s3.local.net
                  aws s3 ls s3://authentik-postgres/dumps/ --endpoint-url http://s3.local.net | \
                    awk '{print $4}' | while read key; do
                      date=$(echo "$key" | grep -oP '\d{8}')
                      if [ -n "$date" ] && [ "$(date -d "$date" +%s)" -lt "$(date -d '3 days ago' +%s)" ]; then
                        aws s3 rm "s3://authentik-postgres/dumps/$key" --endpoint-url http://s3.local.net
                      fi
                    done
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: authentik-postgres-backup-secret
                      key: ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: authentik-postgres-backup-secret
                      key: SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  value: us-east-1
              volumeMounts:
                - name: backup
                  mountPath: /backup
