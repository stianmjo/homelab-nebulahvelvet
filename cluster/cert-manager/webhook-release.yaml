apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: webhook-domeneshop
  namespace: cert-manager
spec:
  interval: 30m

  dependsOn:
    - name: cert-manager
      namespace: cert-manager

  chart:
    spec:
      chart: ./deploy/domeneshop-webhook
      sourceRef:
        kind: GitRepository
        name: cert-manager-webhook-domeneshop
        namespace: flux-system
      interval: 1h

  values:
    groupName: api.domeneshop.no