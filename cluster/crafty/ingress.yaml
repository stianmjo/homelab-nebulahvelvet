apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: craftycontroller
  namespace: crafty
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik-internal
  rules:
    - host: panel.local.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: craftycontroller
                port:
                  number: 8000
