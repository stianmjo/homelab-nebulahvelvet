apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crafty-panel
  namespace: crafty
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-domeneshop
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik-external
  tls:
    - hosts:
        - panel.nebulahvelvet.no
      secretName: crafty-panel-tls
  rules:
    - host: panel.nebulahvelvet.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: craftycontroller-https
                port:
                  number: 8443
