apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crafty-ingress
  namespace: crafty
  annotations:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-domeneshop
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik-external
  rules:
    - host: console.nebulahvelvet.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: craftycontroller-https
                port:
                  number: 8443
  tls:
    - secretName: crafty-console-tls
      hosts:
        - console.nebulahvelvet.no