apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-backup
  namespace: dcsg2005
spec:
  schedule: "0 3 * * *"
  timeZone: Europe/Oslo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: rsync
              # renovate: datasource=docker depName=alpine
              image: alpine:3.21
              command:
                - sh
                - -c
                - |
                  set -e

                  log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"; }

                  log "=== Overleaf Git Backup Starting ==="
                  log "Target: git.overleaf.com/69a818a34f812c729fd65773"
                  log "Backup dir: /backup/overleaf-dcsg2005"

                  log "Installing dependencies..."
                  apk add --no-cache git openssh > /dev/null 2>&1
                  log "Dependencies installed."

                  REPO_URL="https://git:${OVERLEAF_PASS}@git.overleaf.com/69a818a34f812c729fd65773"
                  BACKUP_DIR="/backup/overleaf-dcsg2005"

                  if [ -d "${BACKUP_DIR}" ]; then
                    log "Existing mirror found — updating..."
                    git --git-dir="${BACKUP_DIR}" remote set-url origin "${REPO_URL}"
                    git --git-dir="${BACKUP_DIR}" remote update --prune
                    log "Mirror updated successfully."
                  else
                    log "No mirror found — performing initial clone..."
                    git clone --mirror "${REPO_URL}" "${BACKUP_DIR}"
                    log "Initial clone complete."
                  fi

                  log "Verifying backup integrity..."
                  COMMIT_COUNT=$(git --git-dir="${BACKUP_DIR}" rev-list --count --all)
                  LATEST_COMMIT=$(git --git-dir="${BACKUP_DIR}" log --oneline -1)
                  log "Total commits in mirror: ${COMMIT_COUNT}"
                  log "Latest commit: ${LATEST_COMMIT}"

                  log "=== Backup Completed Successfully ==="
              env:
                - name: TZ
                  value: Europe/Oslo
                - name: OVERLEAF_PASS
                  valueFrom:
                    secretKeyRef:
                      name: git-backup-secret
                      key: OVERLEAF_PASS
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: dcsg2005-backup-nfs