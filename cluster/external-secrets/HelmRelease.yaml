# helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 15m
  chart:
    spec:
      chart: external-secrets
      version: "1.2.1"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 1h

  # Helps Flux handle CRDs sanely on install/upgrade
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace

  values:
    # ESO docs recommend enabling CRD install via Helm values/flag
    installCRDs: true