apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: proton-bridge
spec:
  provider:
    webhook:
      # CHANGE THIS PATH if your API is different:
      # - If your server expects /extract?key=... keep as-is
      # - If it expects /v1/extract/... etc, update accordingly
      url: "http://proton-bridge.proton-bridge.svc.cluster.local:8080/extract?key={{ .remoteRef.key }}"

      # GET is default, but being explicit is nice
      method: GET
      timeout: 10s

      # CHANGE THIS jsonPath to match what your API returns.
      # Example expectation: {"value":"<secret>"} -> $.value
      result:
        jsonPath: "$.value"

      headers:
        Content-Type: application/json

        # Basic auth header built from the secret below (templated)
        # This syntax is from the ESO webhook provider docs. :contentReference[oaicite:1]{index=1}
        Authorization: "Basic {{ print .auth.username \":\" .auth.password | b64enc }}"

      # Expose the credentials secret to the templating engine as ".auth"
      # NOTE: ClusterSecretStore secretRef needs namespace. :contentReference[oaicite:2]{index=2}
      secrets:
        - name: auth
          secretRef:
            namespace: external-secrets
            name: proton-bridge-webhook-credentials