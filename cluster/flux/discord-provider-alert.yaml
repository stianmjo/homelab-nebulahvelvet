apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: discord-cluster-alerts
  namespace: flux-system
spec:
  summary: ""
  # Optional extra metadata that will appear in the message
  eventMetadata:
    cluster: "homelab-nebulahvelvet"
  providerRef:
    name: discord

  # What severity to send (info / error)
  eventSeverity: info

  eventSources:
    - kind: Bucket
      name: "*"
    - kind: GitRepository
      name: "*"
    - kind: Kustomization
      name: "*"
    - kind: HelmRelease
      name: "*"
    - kind: HelmChart
      name: "*"
    - kind: HelmRepository
      name: "*"
    - kind: ImageRepository
      name: "*"
    - kind: ImagePolicy
      name: "*"
    - kind: ImageUpdateAutomation
      name: "*"
  exclusionList:
    - "^Dependencies do not meet ready condition.*"