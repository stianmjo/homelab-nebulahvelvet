---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-actions
  namespace: gitea
spec:
  interval: 30m
  chart:
    spec:
      chart: actions
      # renovate: datasource=helm depName=actions registryUrl=https://dl.gitea.com/charts/
      version: "0.0.5"
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: gitea
      interval: 12h

  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  dependsOn:
    - name: gitea
      namespace: gitea

  values:
    enabled: true

    # Runner registration
    giteaRootURL: "http://gitea-http.gitea.svc.cluster.local:3000"
    existingSecret: "gitea-runner-secret"
    existingSecretKey: "token"

    statefulset:
      replicas: 1
      timezone: "Europe/Oslo"

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 2
          memory: 2Gi

      actRunner:
        registry: docker.gitea.com
        repository: act_runner
        # renovate: datasource=docker depName=docker.gitea.com/act_runner
        tag: "0.2.13"
        pullPolicy: IfNotPresent

        config:
          log:
            level: info
          runner:
            labels:
              - "ubuntu-latest:docker://catthehacker/ubuntu:act-latest"
              - "ubuntu-22.04:docker://catthehacker/ubuntu:act-22.04"
              - "linux:docker://catthehacker/ubuntu:act-latest"
          container:
            network: host
            env:
              DOCKER_HOST: tcp://127.0.0.1:2375

      dind:
        repository: docker
        tag: "28.3.3-dind"
        pullPolicy: IfNotPresent
        extraEnvs:
          # Disable TLS for simpler Docker communication
          - name: DOCKER_TLS_CERTDIR
            value: ""

      persistence:
        size: 5Gi
        storageClass: longhorn-retain