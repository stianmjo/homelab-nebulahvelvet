# Secret template for Gitea Actions runner registration token
#
# To get the token:
# 1. Log into Gitea as admin
# 2. Go to Site Administration → Actions → Runners
# 3. Click "Create new Runner"
# 4. Copy the registration token
#
# Then create the secret:
#   kubectl create secret generic gitea-runner-secret \
#     --namespace gitea \
#     --from-literal=token="<REGISTRATION_TOKEN>"
#
# Or apply this template after filling in the token:
#
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-runner-secret
  namespace: gitea
type: Opaque
stringData:
  token: "<REPLACE_WITH_REGISTRATION_TOKEN>"