# Secret template for Gitea database credentials
# This secret is used by CNPG to bootstrap the database and by Gitea to connect
#
# Apply manually BEFORE deploying the Gitea stack:
#   kubectl apply -f gitea-db-secret.yaml
#
# Generate a secure password:
#   openssl rand -base64 32
#
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-db-credentials
  namespace: gitea
type: kubernetes.io/basic-auth
stringData:
  username: gitea
  password: "<REPLACE_WITH_SECURE_PASSWORD>"

# Secret template for Gitea admin user
# This creates the initial admin account
#
# Apply manually BEFORE deploying the Gitea stack:
#   kubectl apply -f gitea-admin-secret.yaml
#
# Note: The admin username cannot be "admin"
#
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-secret
  namespace: gitea
type: Opaque
stringData:
  username: "gitea_admin"
  password: "<REPLACE_WITH_SECURE_PASSWORD>"
  email: "gitea@nebulahvelvet.no"