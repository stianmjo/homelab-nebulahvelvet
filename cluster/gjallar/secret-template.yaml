# Apply this secret manually before deploying:
#
# kubectl create secret generic gjallar-secret -n discord-bot \
#   --from-literal=DISCORD_TOKEN="<your-discord-bot-token>"
#
apiVersion: v1
kind: Secret
metadata:
  name: gjallar-secret
  namespace: discord-bot
type: Opaque
stringData:
  DISCORD_TOKEN: "<your-discord-bot-token>"