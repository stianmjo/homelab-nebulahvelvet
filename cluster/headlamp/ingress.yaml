apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: kube-system
  annotations:

spec:
  # This must match the ingressClass you configured on traefik-internal
  ingressClassName: traefik-internal
  rules:
    - host: dashboard.local.net  # <-- change to whatever internal DNS you actually use
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  number: 80
