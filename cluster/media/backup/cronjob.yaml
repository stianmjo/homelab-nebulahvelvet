---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arr-backup
  namespace: media
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arr-backup
  namespace: media
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arr-backup
  namespace: media
subjects:
  - kind: ServiceAccount
    name: arr-backup
    namespace: media
roleRef:
  kind: Role
  name: arr-backup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: arr-backup
  namespace: media
spec:
  schedule: "0 3 * * *"  # Daily at 03:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: arr-backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              # renovate: datasource=docker depName=alpine/k8s
              image: alpine/k8s:1.35.3
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  
                  DATE=$(date +%Y-%m-%d)
                  RETENTION_DAYS=14
                  BACKUP_DIR="/backups"
                  
                  echo "=== Arr Stack Backup - $DATE ==="
                  
                  # ── Helper function ─────────────────────────────
                  backup_app() {
                    local APP=$1
                    local POD_LABEL=$2
                    local SOURCE_PATH=$3
                    local CONTAINER=${4:-}
                    
                    echo "Backing up $APP..."
                    mkdir -p "$BACKUP_DIR/$APP"
                    
                    # Find the pod
                    POD=$(kubectl get pods -n media -l "$POD_LABEL" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                    
                    if [ -z "$POD" ]; then
                      echo "  ⚠ No pod found for $APP (label: $POD_LABEL)"
                      return
                    fi
                    
                    # Build container flag if specified
                    CONTAINER_FLAG=""
                    if [ -n "$CONTAINER" ]; then
                      CONTAINER_FLAG="-c $CONTAINER"
                    fi
                    
                    # Find latest backup file
                    LATEST=$(kubectl exec -n media $POD $CONTAINER_FLAG -- sh -c "ls -t $SOURCE_PATH 2>/dev/null | head -1" 2>/dev/null || true)
                    
                    if [ -z "$LATEST" ]; then
                      echo "  ⚠ No backup files found in $SOURCE_PATH"
                      return
                    fi
                    
                    # Copy the backup
                    kubectl cp -n media $CONTAINER_FLAG "$POD:$SOURCE_PATH/$LATEST" "$BACKUP_DIR/$APP/$APP-$DATE.zip" 2>/dev/null
                    
                    if [ -f "$BACKUP_DIR/$APP/$APP-$DATE.zip" ]; then
                      SIZE=$(du -h "$BACKUP_DIR/$APP/$APP-$DATE.zip" | cut -f1)
                      echo "  ✓ Copied $LATEST ($SIZE)"
                    else
                      echo "  ⚠ Failed to copy backup"
                    fi
                  }
                  
                  # ── Backup qBittorrent (tar config) ─────────────
                  backup_qbittorrent() {
                    echo "Backing up qBittorrent..."
                    mkdir -p "$BACKUP_DIR/qbittorrent"
                    
                    POD=$(kubectl get pods -n media -l "app.kubernetes.io/name=qbittorrent" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                    
                    if [ -z "$POD" ]; then
                      echo "  ⚠ No pod found for qBittorrent"
                      return
                    fi
                    
                    # Create tar inside pod and stream it out
                    kubectl exec -n media "$POD" -c app -- tar -czf - -C /config qBittorrent 2>/dev/null > "$BACKUP_DIR/qbittorrent/qbittorrent-$DATE.tar.gz"
                    
                    if [ -s "$BACKUP_DIR/qbittorrent/qbittorrent-$DATE.tar.gz" ]; then
                      SIZE=$(du -h "$BACKUP_DIR/qbittorrent/qbittorrent-$DATE.tar.gz" | cut -f1)
                      echo "  ✓ Created qbittorrent-$DATE.tar.gz ($SIZE)"
                    else
                      rm -f "$BACKUP_DIR/qbittorrent/qbittorrent-$DATE.tar.gz"
                      echo "  ⚠ Failed to create backup"
                    fi
                  }
                  
                  # ── Backup Jellyfin (tar config directly) ───────
                  backup_jellyfin() {
                    echo "Backing up Jellyfin..."
                    mkdir -p "$BACKUP_DIR/jellyfin"
                    
                    POD=$(kubectl get pods -n media -l "app.kubernetes.io/name=jellyfin" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                    
                    if [ -z "$POD" ]; then
                      echo "  ⚠ No pod found for Jellyfin"
                      return
                    fi
                    
                    # Create tar of essential config (excludes metadata/images - can be re-fetched)
                    kubectl exec -n media "$POD" -- tar -czf - -C /config \
                      config \
                      data/jellyfin.db \
                      data/device.txt \
                      data/ScheduledTasks \
                      data/playlists \
                      data/collections \
                      plugins \
                      root \
                      2>/dev/null > "$BACKUP_DIR/jellyfin/jellyfin-$DATE.tar.gz" || true
                    
                    if [ -s "$BACKUP_DIR/jellyfin/jellyfin-$DATE.tar.gz" ]; then
                      SIZE=$(du -h "$BACKUP_DIR/jellyfin/jellyfin-$DATE.tar.gz" | cut -f1)
                      echo "  ✓ Created jellyfin-$DATE.tar.gz ($SIZE)"
                    else
                      rm -f "$BACKUP_DIR/jellyfin/jellyfin-$DATE.tar.gz"
                      echo "  ⚠ Failed to create backup"
                    fi
                  }
                  
                  # ── Run backups ─────────────────────────────────
                  backup_app "sonarr" "app.kubernetes.io/name=sonarr" "/config/Backups/scheduled"
                  backup_app "radarr" "app.kubernetes.io/name=radarr" "/config/Backups/scheduled"
                  backup_app "prowlarr" "app.kubernetes.io/name=prowlarr" "/config/Backups/scheduled"
                  backup_app "bazarr" "app.kubernetes.io/name=bazarr" "/config/backup"
                  backup_jellyfin
                  backup_qbittorrent
                  
                  # ── Retention cleanup ───────────────────────────
                  echo ""
                  echo "Cleaning up backups older than $RETENTION_DAYS days..."
                  find $BACKUP_DIR -type f \( -name "*.zip" -o -name "*.tar.gz" \) -mtime +$RETENTION_DAYS -delete -print | while read f; do
                    echo "  ✗ Deleted $f"
                  done
                  
                  # ── Summary ─────────────────────────────────────
                  echo ""
                  echo "=== Backup complete ==="
                  echo "Backup sizes:"
                  du -sh $BACKUP_DIR/*/ 2>/dev/null || true
                  echo ""
                  echo "Total:"
                  du -sh $BACKUP_DIR 2>/dev/null || true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: arr-backups