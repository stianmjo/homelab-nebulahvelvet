apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: media
      # renovate: datasource=helm depName=app-template registryUrl=https://bjw-s-labs.github.io/helm-charts/
      version: "4.6.2"
      interval: 12h

  values:
    controllers:
      bazarr:
        replicas: 1
        strategy: Recreate
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/bazarr
              # renovate: datasource=docker depName=lscr.io/linuxserver/bazarr
              tag: v1.5.4-ls330
            env:
              TZ: Europe/Oslo
              PUID: "1000"
              PGID: "1000"
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 2Gi

    service:
      app:
        controller: bazarr
        ports:
          http:
            port: 6767

    ingress:
      app:
        enabled: true
        className: traefik-internal
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
        hosts:
          - host: bazarr.local.net
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http

    persistence:
      config:
        enabled: true
        existingClaim: bazarr-config
        globalMounts:
          - path: /config

      media:
        enabled: true
        existingClaim: media-nfs
        globalMounts:
          - path: /media
