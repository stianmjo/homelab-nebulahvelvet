apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flaresolverr
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: media
      # renovate: datasource=helm depName=app-template registryUrl=https://bjw-s-labs.github.io/helm-charts/
      version: "4.6.2"
      interval: 12h

  values:
    controllers:
      flaresolverr:
        replicas: 1
        strategy: Recreate

        containers:
          app:
            image:
              repository: ghcr.io/flaresolverr/flaresolverr
              # renovate: datasource=docker depName=ghcr.io/flaresolverr/flaresolverr
              tag: "v3.4.5"
            env:
              TZ: Europe/Oslo
              LOG_LEVEL: info
              LOG_HTML: "false"
              CAPTCHA_SOLVER: none
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 1Gi

    service:
      app:
        controller: flaresolverr
        ports:
          http:
            port: 8191