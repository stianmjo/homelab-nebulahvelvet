apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      # renovate: datasource=helm depName=jellyfin registryUrl=https://jellyfin.github.io/jellyfin-helm
      version: "3.0.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: media
      interval: 12h

  values:
    nameOverride: ""
    fullnameOverride: "jellyfin"

    serviceAccount:
      create: true
      automount: true
      annotations: {}
      name: ""

    deploymentStrategy:
      type: RollingUpdate

    deploymentAnnotations: {}

    service:
      type: ClusterIP
      port: 8096
      portName: service
      annotations: {}
      labels: {}

    ingress:
      enabled: true
      className: traefik-external
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-domeneshop
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.middlewares: traefik-external-f2b-jellyfin@kubernetescrd,traefik-external-jellyfin-chain@kubernetescrd
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - host: jellyfin.nebulahvelvet.no
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: jellyfin-tls
          hosts:
            - jellyfin.nebulahvelvet.no

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
        ephemeral-storage: 5Gi
      limits:
        cpu: "4"
        memory: 8Gi
        ephemeral-storage: 60Gi

    startupProbe:
      tcpSocket:
        port: http
      initialDelaySeconds: 0
      periodSeconds: 10
      failureThreshold: 30

    podSecurityContext:
      supplementalGroups:
        - 44    # video
        - 993   # render

    jellyfin:
      env:
        - name: TZ
          value: Europe/Oslo
        - name: JELLYFIN_CACHE_DIR
          value: /cache

    persistence:
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 20Gi
        annotations: {}
        storageClass: longhorn-retain

      media:
        enabled: true
        type: pvc
        hostPath: ""
        existingClaim: media-nfs

      cache:
        enabled: false

    volumes:
      - name: jellyfin-cache
        persistentVolumeClaim:
          claimName: jellyfin-cache
      - name: transcodes
        emptyDir:
          sizeLimit: 50Gi
      - name: dri
        hostPath:
          path: /dev/dri
          type: Directory

    volumeMounts:
      - name: jellyfin-cache
        mountPath: /cache
      - name: transcodes
        mountPath: /cache/transcodes
      - name: dri
        mountPath: /dev/dri