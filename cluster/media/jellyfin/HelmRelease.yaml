apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      # renovate: datasource=helm depName=jellyfin registryUrl=https://jellyfin.github.io/jellyfin-helm
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: media
      interval: 12h

  values:
    fullnameOverride: jellyfin

    service:
      type: ClusterIP
      port: 8096

    # If you want TZ and other env, the chart supports jellyfin.env (list)
    jellyfin:
      env:
        - name: TZ
          value: Europe/Oslo

    # Reasonable baseline; bump if you do lots of transcoding
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi

    persistence:
      # Config on Longhorn (chart will create PVC for it)
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 20Gi
        storageClass: longhorn-retain

      # Media comes from your existing NFS PVC named "media-nfs"
      media:
        enabled: true
        type: pvc
        existingClaim: media-nfs
        # accessMode/size/storageClass are ignored when using existingClaim, but harmless to omit.

      # Cache on Longhorn (recommended when media is on NFS)
      cache:
        enabled: true
        type: pvc
        accessMode: ReadWriteOnce
        size: 20Gi
        storageClass: longhorn-retain
