apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      # renovate: datasource=helm depName=jellyfin registryUrl=https://jellyfin.github.io/jellyfin-helm
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: media
      interval: 12h

  values:
    nameOverride: ""
    fullnameOverride: "jellyfin"

    serviceAccount:
      create: true
      automount: true
      annotations: {}
      name: ""

    deploymentStrategy:
      type: RollingUpdate

    deploymentAnnotations: {}

    service:
      type: ClusterIP
      port: 8096
      portName: service
      annotations: {}
      labels: {}

    ingress:
      enabled: true
      className: traefik-external
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-domeneshop
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - host: jellyfin.nebulahvelvet.no
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: jellyfin-tls
          hosts:
            - jellyfin.nebulahvelvet.no

    # Resource limits remembered + set to something sane.
    # If you hardware-transcode later, you can raise CPU/mem or add GPU device config.
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 8Gi

    startupProbe:
      tcpSocket:
        port: http
      initialDelaySeconds: 0
      periodSeconds: 10
      failureThreshold: 30

    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10

    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10

    jellyfin:
      env:
        - name: TZ
          value: Europe/Oslo
        # Optional: explicitly define cache dir (defaults usually already /cache)
        - name: JELLYFIN_CACHE_DIR
          value: /cache

    persistence:
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 20Gi
        annotations: {}
        storageClass: longhorn-retain

      media:
        enabled: true
        type: pvc
        hostPath: ""
        # When existingClaim is set, size/accessMode/storageClass don’t matter for provisioning.
        existingClaim: media-nfs

      cache:
        enabled: false
