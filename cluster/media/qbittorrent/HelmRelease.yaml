apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: media
      # renovate: datasource=helm depName=app-template registryUrl=https://bjw-s-labs.github.io/helm-charts/
      version: "4.5.0"
      interval: 12h

  values:
    controllers:
      qbittorrent:
        # Good default for NFS/shared volumes: keep a consistent UID/GID.
        # If your NFS permissions differ, we’ll adjust these.
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              repository: lscr.io/linuxserver/qbittorrent
              # renovate: datasource=docker depName=lscr.io/linuxserver/qbittorrent
              tag: 5.1.4-r1-ls435
            env:
              TZ: Europe/Oslo
              PUID: "1000"
              PGID: "1000"
              WEBUI_PORT: "8080"

            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 2Gi

    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: 8080
          bittorrent-tcp:
            port: 6881
            protocol: TCP
          bittorrent-udp:
            port: 6881
            protocol: UDP

    ingress:
      app:
        enabled: true
        className: traefik-internal
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
        hosts:
          - host: qbittorrent.local.net
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http

    persistence:
      config:
        enabled: true
        existingClaim: qbittorrent-config
        globalMounts:
          - path: /config

      downloads:
        enabled: true
        existingClaim: media-nfs
        globalMounts:
          - path: /downloads
            subPath: qbittorrent
