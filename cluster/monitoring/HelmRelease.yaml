apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "80.14.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h

  values:
    # ---- Disable Alertmanager entirely ----
    alertmanager:
      enabled: false

    # ---- Grafana ----
    grafana:
      enabled: true

      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password

      persistence:
        enabled: true
        type: pvc
        storageClassName: longhorn-retain
        size: 5Gi

      service:
        type: ClusterIP
        port: 80

    # ---- Prometheus ----
    prometheus:
      enabled: true
      prometheusSpec:
        retention: 15d

        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-retain
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi

    # ---- node-exporter (DaemonSet) ----
    prometheus-node-exporter:
      enabled: true
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      extraArgs:
        - --collector.hwmon
        - --collector.thermal_zone

    # kube-state-metrics is commonly useful; leaving enabled is typical
    kube-state-metrics:
      enabled: true
