apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: loki
      version: "6.29.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      limits_config:
        ingestion_rate_mb: 32
        ingestion_burst_size_mb: 64
        reject_old_samples: true
        reject_old_samples_max_age: 168h
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn-retain
        size: 10Gi

    # Disable microservice components (not used in SingleBinary mode)
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Disable minio (we use filesystem storage)
    minio:
      enabled: false

    # Disable gateway (direct access from Promtail/Alloy)
    gateway:
      enabled: false

    lokiCanary:
      enabled: false

    test:
      enabled: false
