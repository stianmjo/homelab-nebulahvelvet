apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: promtail
      version: "6.16.6"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h
  values:
    config:
      clients:
        - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

      snippets:
        # Default pipeline: parse CRI log format from all pods
        pipelineStages:
          - cri: {}

        # Override scrape configs to add Traefik JSON access log parsing
        scrapeConfigs: |
          - job_name: kubernetes-pods
            kubernetes_sd_configs:
              - role: pod
            pipeline_stages:
              - cri: {}
              - match:
                  selector: '{app_kubernetes_io_name="traefik"}'
                  stages:
                    - json:
                        expressions:
                          client_ip: ClientHost
                          status:    OriginStatus
                          router:    RouterName
                          method:    RequestMethod
                          path:      RequestPath
                    - labels:
                        client_ip:
                        status:
                        router:
                        method:
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_node_name]
                target_label: __host__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod
              - source_labels: [__meta_kubernetes_pod_container_name]
                target_label: container
              - replacement: /var/log/pods/*$1/*.log
                separator: /
                source_labels:
                  - __meta_kubernetes_pod_uid
                  - __meta_kubernetes_pod_container_name
                target_label: __path__

    # DaemonSet needs access to host log paths
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
