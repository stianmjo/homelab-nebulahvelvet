apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vms
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
      interval: 1h
  values:
    server:
      fullnameOverride: vms
      retentionPeriod: 15d
      persistentVolume:
        enabled: true
        storageClassName: longhorn-retain
        size: 20Gi