apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector
  namespace: neuvector
spec:
  interval: 15m
  dependsOn:
    - name: neuvector-crd
  chart:
    spec:
      chart: core
      version: "2.8.10" # renovate: datasource=helm depName=neuvector/core
      sourceRef:
        kind: HelmRepository
        name: neuvector
        namespace: flux-system

  values:
    registry: docker.io
    tag: "5.4.8" # renovate: datasource=docker depName=neuvector/controller

    internal:
      autoGenerateCert: true
      autoRotateCert: true

    containerd:
      enabled: true
      path: /var/run/containerd/containerd.sock

    controller:
      pvc:
        enabled: true
        storageClass: nfs-odin
        accessModes: [ReadWriteMany]
        capacity: 5Gi

    # Ensure the WebUI service gets the Traefik Service annotations
    manager:
      svc:
        type: ClusterIP
        annotations:
          traefik.ingress.kubernetes.io/service.serversscheme: "https"
          traefik.ingress.kubernetes.io/service.serverstransport: "neuvector-webui-skipverify@kubernetescrd"