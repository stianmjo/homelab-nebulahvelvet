apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pufferpanel
  namespace: pufferpanel
  annotations:
    # cert-manager: use your existing ClusterIssuer
    cert-manager.io/cluster-issuer: letsencrypt-domeneshop

    # Force HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # Optional but nice for WebSockets / long-lived console connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pufferpanel.nebulahvelvet.no
      secretName: pufferpanel-tls

  rules:
    - host: pufferpanel.nebulahvelvet.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pufferpanel      # <- Service name from the Helm chart
                port:
                  number: 8080