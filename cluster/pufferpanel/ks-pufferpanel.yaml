apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pufferpanel
  namespace: flux-system
spec:
  interval: 5m
  # path is still from repo root, *not* from this file’s folder
  path: ./cluster/pufferpanel
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: pufferpanel