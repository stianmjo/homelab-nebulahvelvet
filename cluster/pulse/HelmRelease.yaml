apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pulse
  namespace: pulse
spec:
  interval: 30m
  chart:
    spec:
      chart: pulse
      # renovate: datasource=helm depName=pulse registryUrl=https://rcourtman.github.io/Pulse
      version: "5.1.27"
      sourceRef:
        kind: HelmRepository
        name: pulse
        namespace: pulse
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  values:
    # ── Image ─────────────────────────────────────────────────────────────────
    image:
      repository: rcourtman/pulse
      # renovate: datasource=docker depName=rcourtman/pulse
      tag: "5.1.27"

    # ── Replicas ─────────────────────────────────────────────────────────────
    replicaCount: 1

    # ── Secret ───────────────────────────────────────────────────────────────
    # VERIFY: run `helm show values pulse/pulse` to confirm the exact field name
    # for referencing a pre-existing secret (may be existingSecretName or
    # existingSecret). The chart looks for the secret named "pulse-secret".
    server:
      secretEnv:
        create: false
        existingSecretName: pulse-secret

    # ── Persistence ───────────────────────────────────────────────────────────
    # Pulse stores config, metrics history and credentials under /data
    persistence:
      enabled: true
      storageClassName: longhorn-retain
      size: 5Gi
      accessMode: ReadWriteOnce

    # ── Ingress ───────────────────────────────────────────────────────────────
    # Handled by separate ingress.yaml via traefik-internal
    ingress:
      enabled: false

    # ── Kubernetes monitoring ─────────────────────────────────────────────────
    # The Helm chart creates a ServiceAccount + ClusterRole/ClusterRoleBinding
    # so Pulse can monitor this K8s cluster in-cluster automatically.
    serviceAccount:
      create: true

    # ── Resources ─────────────────────────────────────────────────────────────
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # ── Environment ───────────────────────────────────────────────────────────
    env:
      TZ: Europe/Oslo
      # Disable Proxmox auto-discovery — this cluster has no Proxmox nodes
      DISCOVERY_ENABLED: "false"