apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse
  namespace: pulse
  annotations:
    kubernetes.io/ingress.class: traefik-internal
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik-internal
  rules:
    - host: pulse.local.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # The chart typically names the service after the release (pulse)
                # Verify with: kubectl get svc -n pulse after first deploy
                name: pulse
                port:
                  number: 7655