# ── Secret Template ───────────────────────────────────────────────────────────
# DO NOT COMMIT actual values. Apply this manually before Flux deploys:
#
#   kubectl create secret generic pulse-secret \
#     --namespace pulse \
#     --from-literal=PULSE_AUTH_USER='admin' \
#     --from-literal=PULSE_AUTH_PASS='<plain text; Pulse auto-bcrypt-hashes on first boot>' \
#     --from-literal=API_TOKENS='<comma-separated tokens for agents/API>'
#
# Or with a bcrypt pre-hash (60-char string):
#   PULSE_AUTH_PASS='$2a$12$<hash>'
#
# Tip: generate a token with:
#   openssl rand -hex 32
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: pulse-secret
  namespace: pulse
type: Opaque
stringData:
  PULSE_AUTH_USER: "CHANGEME"
  PULSE_AUTH_PASS: "CHANGEME"
  API_TOKENS: "CHANGEME"