apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 3 * * *"   # every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:42.57.1
              args:
                - "stianmjo/homelab-nebulahvelvet"
              env:
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-env
                      key: RENOVATE_TOKEN

                - name: RENOVATE_PLATFORM
                  value: github
                - name: RENOVATE_ENDPOINT
                  value: https://api.github.com/

                # Global-only settings belong here:
                - name: RENOVATE_AUTODISCOVER
                  value: "false"
                - name: RENOVATE_ONBOARDING
                  value: "false"
                - name: RENOVATE_REQUIRE_CONFIG
                  value: "ignored"

                - name: RENOVATE_TIMEZONE
                  value: Europe/Oslo
                - name: LOG_LEVEL
                  value: info
