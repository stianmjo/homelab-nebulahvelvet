apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: <app-name>
  namespace: <namespace>
  annotations:
    # REQUIRED: make cert-manager request the cert
    cert-manager.io/cluster-issuer: letsencrypt-domeneshop

    # REQUIRED: force Traefik class selection (legacy + compatibility)
    kubernetes.io/ingress.class: traefik-external

    # OPTIONAL: force https redirect (Traefik generally handles this, but keep if you want)
    # traefik.ingress.kubernetes.io/redirect-entry-point: websecure

    # OPTIONAL: max upload size (uncomment if needed)
    # traefik.ingress.kubernetes.io/buffering: |
    #   maxRequestBodyBytes: 104857600

spec:
  # REQUIRED: modern way (what k9s reads)
  ingressClassName: traefik-external

  tls:
    - secretName: <app-name>-tls
      hosts:
        - <host.example.com>

  rules:
    - host: <host.example.com>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: <service-name>
                port:
                  number: <service-port>
