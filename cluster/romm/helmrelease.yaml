apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: romm
  namespace: romm
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: media
      interval: 12h
  values:
    controllers:
      romm:
        replicas: 1
        strategy: Recreate
        pod:
          enableServiceLinks: false
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              # renovate: datasource=docker depName=rommapp/romm
              repository: rommapp/romm
              tag: "3.7.3"
            env:
              TZ: Europe/Oslo
              DB_HOST: romm-postgres-rw.romm.svc.cluster.local
              DB_NAME: romm
              DB_USER: romm
              DB_PORT: "5432"
              ROMM_DB_DRIVER: postgresql
              REDIS_HOST: "127.0.0.1"
              REDIS_PORT: "6379"
              HASHEOUS_API_ENABLED: "true"
              PLAYMATCH_API_ENABLED: "true"
              LAUNCHBOX_API_ENABLED: "true"
            envFrom:
              - secretRef:
                  name: romm-secret
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi

          redis:
            image:
              # renovate: datasource=docker depName=valkey/valkey
              repository: valkey/valkey
              tag: "8.1.1"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

    service:
      app:
        controller: romm
        ports:
          http:
            port: 8080

    persistence:
      resources:
        existingClaim: romm-resources
        globalMounts:
          - path: /romm/resources
      assets:
        existingClaim: romm-assets
        globalMounts:
          - path: /romm/assets
      config:
        existingClaim: romm-config
        globalMounts:
          - path: /romm/config
      library:
        existingClaim: media-nfs
        globalMounts:
          - path: /romm/library