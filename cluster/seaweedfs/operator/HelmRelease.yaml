apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seaweedfs-operator
  namespace: seaweedfs
spec:
  interval: 1h
  chart:
    spec:
      chart: seaweedfs-operator
      version: "0.1.13" # renovate: datasource=helm depName=seaweedfs-operator registryUrl=https://seaweedfs.github.io/seaweedfs-operator/
      sourceRef:
        kind: HelmRepository
        name: seaweedfs-operator
        namespace: seaweedfs
  values:
    webhook:
      enabled: false