apiVersion: v1
kind: Secret
metadata:
  name: seaweed-s3-config
  namespace: seaweedfs
type: Opaque
stringData:
  seaweedfs_s3_config.json: |
    {
      "identities": [
        {
          "name": "longhorn",
          "actions": [
            "Read:longhorn",
            "List:longhorn",
            "Tagging:longhorn",
            "Write:longhorn"
          ],
          "credentials": [
            { "accessKey": "longhorn", "secretKey": "...." }
          ]
        },
        {
          "name": "read-only",
          "actions": ["Read","List"],
          "credentials": [
            { "accessKey": "ro", "secretKey": "...<." }
          ]
        }
      ]
    }

# Notes:
# - Create bucket buckets up front with an admin identity.