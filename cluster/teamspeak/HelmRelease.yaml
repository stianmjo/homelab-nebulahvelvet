apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teamspeak6
  namespace: teamspeak
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      # renovate: datasource=helm depName=app-template registryUrl=https://bjw-s-labs.github.io/helm-charts/
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-teamspeak
        namespace: flux-system
      interval: 1h
  values:
    controllers:
      main:
        replicas: 1
        containers:
          app:
            image:
              repository: teamspeaksystems/teamspeak6-server
              # renovate: datasource=docker depName=teamspeaksystems/teamspeak6-server
              tag: "v6.0.0-beta8"
            env:
              TSSERVER_LICENSE_ACCEPTED: accept

    service:
      main:
        type: LoadBalancer
        ports:
          voice:
            port: 9987
            protocol: UDP
          filetransfer:
            port: 30033
            protocol: TCP

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-retain
        accessMode: ReadWriteMany
        size: 10Gi
        globalMounts:
          - path: /var/tsserver

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi