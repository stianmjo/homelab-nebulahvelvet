apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external
  namespace: traefik-external
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  values:
    deployment:
      replicas: 2

    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: false   # keep off until you want IngressRoute/Middleware CRDs

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-external

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.82   # <-- TEMP test IP from MetalLB pool
        externalTrafficPolicy: Local

    ports:
      web:
        port: 80
        redirectTo:
          port: websecure
      websecure:
        port: 443

    # Don’t expose dashboard publicly by default
    ingressRoute:
      dashboard:
        enabled: false
