apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external
  namespace: traefik-external
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik-external      # keep your repo name
        namespace: flux-system
      interval: 1h
  values:
    deployment:
      replicas: 2

    providers:
      kubernetesIngress:
        enabled: true
        # 👉 This is the important bit: only handle this class
        ingressClass: traefik-external
        allowEmptyServices: true
        allowExternalNameServices: false
      kubernetesCRD:
        enabled: false   # still off, you’re only using Ingress

    # This just ensures the IngressClass object exists
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-external

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.82
        externalTrafficPolicy: Local

    ports:
      # no HTTP on external
      web:
        expose:
          default: false

      websecure:
        expose:
          default: true
        port: 8443        # container port (non-privileged)
        exposedPort: 443  # LoadBalancer port

    # Don’t expose dashboard publicly
    ingressRoute:
      dashboard:
        enabled: true
        insecure: false
