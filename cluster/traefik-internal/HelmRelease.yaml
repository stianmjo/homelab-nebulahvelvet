apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-internal
  namespace: traefik-internal
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik-internal
        namespace: flux-system
      interval: 1h
  values:
    deployment:
      replicas: 2

    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: false   # keep off until you want IngressRoute/Middleware CRDs

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-internal

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.83   # <-- TEMP test IP from MetalLB pool
        externalTrafficPolicy: Local

    ports:
      websecure:
        expose:
          default: true
        port: 8444        # container port (non-privileged, default)
        exposedPort: 443  # LoadBalancer port

    # Don’t expose dashboard publicly by default
    ingressRoute:
      dashboard:
        enabled: false
