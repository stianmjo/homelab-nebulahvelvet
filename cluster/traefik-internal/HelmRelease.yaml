apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-internal
  namespace: traefik-internal
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik-internal      # or "traefik" if you reuse the same repo
        namespace: flux-system
      interval: 1h
  values:
    deployment:
      replicas: 2

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-internal   # 👉 only handle this class
        allowEmptyServices: true
        allowExternalNameServices: false
      kubernetesCRD:
        enabled: false

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-internal

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.83
        externalTrafficPolicy: Local

    api:
      dashboard: true

    ports:
      # INTERNAL HTTP (80) – enabled
      web:
        expose:
          default: true    # expose this entrypoint
        port: 8000         # container port (default)
        exposedPort: 80    # MetalLB / node port 80

      # INTERNAL HTTPS – disabled
      websecure:
        expose:
          default: false   # don't expose 443 at all
      
      traefik:
        port: 8080     # container port
        expose:
          default: true
        exposedPort: 8080

    ingressRoute:
      dashboard:
        enabled: true
        insecure: true
