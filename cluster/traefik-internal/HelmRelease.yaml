apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-internal
  namespace: traefik-internal
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik-internal      # or "traefik" if you reuse the same repo
        namespace: flux-system
      interval: 1h
  values:
    deployment:
      replicas: 2

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-internal   # 👉 only handle this class
        allowEmptyServices: true
        allowExternalNameServices: false
      kubernetesCRD:
        enabled: false

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-internal

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.83
        externalTrafficPolicy: Local

    ports:
      web:
        expose:
          default: false

      websecure:
        expose:
          default: true
        port: 8444        # your chosen internal container port
        exposedPort: 443  # still 443 on the LB

    ingressRoute:
      dashboard:
        enabled: false
