apiVersion: v1
kind: Service
metadata:
  name: traefik-internal-dashboard
  namespace: traefik-internal
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.2.85    # pick a free MetalLB IP, NOT 10.0.2.82
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-internal
  ports:
    - name: dashboard
      port: 80                 # what you hit from LAN
      targetPort: 9000         # Traefik dashboard port
