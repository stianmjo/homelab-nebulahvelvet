apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external
  namespace: traefik-external
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "39.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h

  values:
    deployment:
      replicas: 2

      # ✅ ADDED: writable storage for Traefik plugin manager (/plugins-storage)
      # Fixes: "mkdir plugins-storage: read-only file system"
      additionalVolumes:
        - name: plugins-storage
          emptyDir: {}

    # ✅ ADDED: mount that volume into the Traefik container
    additionalVolumeMounts:
      - name: plugins-storage
        mountPath: /plugins-storage

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-external
        allowEmptyServices: true
        allowExternalNameServices: false

      kubernetesCRD:
        enabled: true
        ingressClass: traefik-external
        allowCrossNamespace: true

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-external

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.82
        externalTrafficPolicy: Local

    api:
      dashboard: true

    experimental:
      plugins:
        wrangler:
          moduleName: github.com/holysoles/bot-wrangler-traefik-plugin
          version: v0.10.1
      
        fail2ban:
          moduleName: github.com/tomMoulard/fail2ban
          version: v0.8.9
          
    additionalArguments:
      - "--api.insecure=true"

    ports:
      web:
        expose:
          default: true
        port: 8000
        exposedPort: 80

      websecure:
        expose:
          default: true
        port: 8443
        exposedPort: 443

      traefik:
        port: 8080
        expose:
          default: false

      metrics:
        port: 9100
        expose:
          default: true
        exposedPort: 9100
        protocol: TCP
    
    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        serviceMonitor:
          enabled: true
          interval: 30s
          additionalLabels:
            release: monitoring

    ingressRoute:
      dashboard:
        enabled: false
