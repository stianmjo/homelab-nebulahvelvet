apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external
  namespace: traefik-external
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "38.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  
  values:
    deployment:
      replicas: 2

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-external
        allowEmptyServices: true
        allowExternalNameServices: false

      # IMPORTANT: must be ON for dashboard IngressRoute
      kubernetesCRD:
        enabled: true

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-external

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.82
        externalTrafficPolicy: Local

    api:
      dashboard: true

    ports:
      # Enable HTTP on 80 (LAN-only, since you won't port-forward it)
      web:
        expose:
          default: true
        port: 8000        # container port
        exposedPort: 80   # MetalLB / node port 80

      # Public HTTPS on 443 (what you forward from WAN)
      websecure:
        expose:
          default: true
        port: 8443
        exposedPort: 443

      # Do NOT expose the raw traefik port; dashboard goes via IngressRoute on 'web'
      traefik:
        port: 8080
        expose:
          default: false

    ingressRoute:
      dashboard:
        enabled: true
        # Hostname you want to use for the external controller dashboard (LAN only)
        matchRule: Host(`traefik-external.local.net`)
        entryPoints:
          - web          # plain HTTP on port 80
        # no TLS here; it's just http:// on LAN
