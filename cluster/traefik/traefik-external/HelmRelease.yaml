apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external
  namespace: traefik-external
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "38.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  
  values:
    deployment:
      replicas: 2

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-external
        allowEmptyServices: true
        allowExternalNameServices: false

      # CRDs must be on so Traefik can see IngressRoutes
      kubernetesCRD:
        enabled: true
        ingressClass: traefik-external
        allowCrossNamespace: true

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-external

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.82
        externalTrafficPolicy: Local

    api:
      dashboard: true

    # Expose /api and /dashboard on the internal "traefik" entrypoint only
    additionalArguments:
      - "--api.insecure=true"
      - "--experimental.plugins.wrangler.modulename=github.com/holysoles/bot-wrangler-traefik-plugin"
      - "--experimental.plugins.wrangler.version=v0.10.1"

    ports:
      # HTTP on 80 (public)
      web:
        expose:
          default: true
        port: 8000        # container port
        exposedPort: 80   # MetalLB / LB port 80

      # HTTPS on 443 (public)
      websecure:
        expose:
          default: true
        port: 8443
        exposedPort: 443

      # Internal-only Traefik API / dashboard entrypoint
      traefik:
        port: 8080
        expose:
          default: false   # no LB port for this, only pod port

    # Disable the chart's built-in dashboard IngressRoute
    ingressRoute:
      dashboard:
        enabled: false