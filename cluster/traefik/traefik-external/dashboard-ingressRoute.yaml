apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-external-dashboard-via-internal
  namespace: traefik-external
  annotations:
    kubernetes.io/ingress.class: traefik-internal
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`traefik-external.local.net`)
      kind: Rule
      services:
        - name: traefik-external-dashboard
          port: traefik
          passHostHeader: true
