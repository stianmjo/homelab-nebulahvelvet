apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: public-ratelimit
  namespace: traefik-external
spec:
  rateLimit:
    average: 20
    burst: 40
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: public-inflight
  namespace: traefik-external
spec:
  inFlightReq:
    amount: 60
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: public-botwrangler
  namespace: traefik-external
spec:
  plugin:
    wrangler:
      botAction: BLOCK
      botBlockHttpCode: 403
      logLevel: INFO
      setNoArchiveHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: public-chain
  namespace: traefik-external
spec:
  chain:
    middlewares:
      - name: public-botwrangler 
      - name: public-ratelimit
      - name: public-inflight