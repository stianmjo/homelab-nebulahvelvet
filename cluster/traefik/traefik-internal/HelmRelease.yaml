apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-internal
  namespace: traefik-internal
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "39.0.8"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  values:
    deployment:
      replicas: 2

    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik-internal
        allowEmptyServices: true
        allowExternalNameServices: false

      # IMPORTANT: must be ON for the dashboard IngressRoute
      kubernetesCRD:
        enabled: true
        ingressClass: traefik-internal

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-internal

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 10.0.2.83
        externalTrafficPolicy: Local

    api:
      dashboard: true

    ports:
      # INTERNAL HTTP (80)
      web:
        expose:
          default: true
        port: 8000       # container port
        exposedPort: 80  # MetalLB / node port 80

      # No HTTPS internally (for now)
      websecure:
        expose:
          default: true
        port: 8443
        exposedPort: 443

      # Do NOT expose the traefik port; dashboard goes via IngressRoute on 'web'
      traefik:
        port: 8080
        expose:
          default: false

      metrics:
        port: 9100
        expose:
          default: true
        exposedPort: 9100
        protocol: TCP
    
    ingressRoute:
      dashboard:
        enabled: true
        # Hostname you want to use on LAN
        matchRule: Host(`traefik-internal.local.net`)
        entryPoints:
          - web
        # (no TLS here -> plain http)
