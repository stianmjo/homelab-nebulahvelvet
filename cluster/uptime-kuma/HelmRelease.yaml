apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 15m

  chart:
    spec:
      chart: uptime-kuma
      version: "2.24.0"
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma
        namespace: flux-system
      interval: 1h

  values:
    env:
      TZ: Europe/Oslo

    image:
      repository: louislam/uptime-kuma
      tag: "2.0.2" # renovate: datasource=docker depName=louislam/uptime-kuma
      

    service:
      type: ClusterIP
      port: 3001

    persistence:
      enabled: true
      size: 1Gi
      storageClass: longhorn

    ingress:
      enabled: false
