apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 15m
  chart:
    spec:
      chart: uptime-kuma
      version: "2.24.0"
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma
        namespace: flux-system
      interval: 1h

  values:
    env:
      TZ: Europe/Oslo

    service:
      type: ClusterIP
      port: 3001

    persistence:
      enabled: true
      size: 1Gi
      storageClass: longhorn

    ingress:
      enabled: true
      ingressClassName: traefik-external
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-domeneshop
        kubernetes.io/ingress.class: traefik-external
      hosts:
        - host: status.nebulahvelvet.no
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: uptime-kuma-tls
          hosts:
            - status.nebulahvelvet.no